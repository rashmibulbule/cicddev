name: Deploy App
on:
push:
branches:- main
jobs:
deploy:
runs-on: ubuntu-latest
steps:- name: Checkout
uses: actions/checkout@v4- name: Deploy to EC2
uses: appleboy/ssh-action@v1.0.3
with:
host: ${{ secrets.EC2_HOST }}
username: ${{ secrets.EC2_USERNAME }}
key: ${{ secrets.EC2_SSH_KEY }}
script: |
cd /home/ubuntu
if [ ! -d "devops-notes-app" ]; then
git clone YOUR_REPO_URL
fi
cd devops-notes-app
git pull origin main
docker compose down
docker compose up --build -d